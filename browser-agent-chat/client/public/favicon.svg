<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Browser window frame -->
  <rect x="2" y="4" width="28" height="24" rx="3" ry="3" fill="#6366f1" />
  <!-- Title bar -->
  <rect x="2" y="4" width="28" height="7" rx="3" ry="3" fill="#4f46e5" />
  <rect x="2" y="8" width="28" height="3" fill="#4f46e5" />
  <!-- Title bar dots -->
  <circle cx="6.5" cy="7.5" r="1.2" fill="#f87171" />
  <circle cx="10" cy="7.5" r="1.2" fill="#fbbf24" />
  <circle cx="13.5" cy="7.5" r="1.2" fill="#34d399" />
  <!-- Browser content area -->
  <rect x="4" y="13" width="24" height="13" rx="1" fill="#1e1b4b" />
  <!-- Agent eye / bot indicator -->
  <ellipse cx="16" cy="20" rx="6" ry="4" fill="none" stroke="#a5b4fc" stroke-width="1.5" />
  <circle cx="16" cy="20" r="2.5" fill="#a5b4fc" />
  <circle cx="16" cy="20" r="1" fill="#1e1b4b" />
  <!-- Scanning lines -->
  <line x1="7" y1="16" x2="11" y2="16" stroke="#818cf8" stroke-width="0.8" stroke-linecap="round" />
  <line x1="21" y1="16" x2="25" y2="16" stroke="#818cf8" stroke-width="0.8" stroke-linecap="round" />
  <line x1="7" y1="24" x2="12" y2="24" stroke="#818cf8" stroke-width="0.8" stroke-linecap="round" />
  <line x1="20" y1="24" x2="25" y2="24" stroke="#818cf8" stroke-width="0.8" stroke-linecap="round" />
</svg>
